<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP Рецепти</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>
<body class="bg-light">

<div id="app">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="#">MVP Рецепти</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Головна</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row g-4">

            <div class="col-12 col-md-5">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white text-primary fw-bold py-3">Вхід до системи</div>
                    <div class="card-body p-4">
                        <form id="login-form">
                            <div class="mb-3">
                                <label class="form-label text-secondary fw-semibold">Електронна пошта</label>
                                <input type="email" class="form-control" placeholder="@gmail.com" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-secondary fw-semibold">Пароль</label>
                                <input type="password" class="form-control" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Увійти</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-7">
                <div class="card shadow-sm">
                    <div class="card-header fw-bold d-flex justify-content-between align-items-center">
                        <span>Дані з API</span>
                        <span class="badge bg-secondary rounded-pill">{{ items.length }}</span>
                    </div>

                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center py-3" v-for="u in items" :key="u.id">
                            <div>
                                <div class="fw-bold text-dark mb-1">{{ u.name }}</div>
                                <div class="text-muted small">{{ u.ingredients }}</div>
                            </div>
                            <span class="badge rounded-pill px-3 py-2" :class="u.badgeClass">{{ u.role }}</span>
                        </li>
                    </ul>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                items: [
                    {
                        id: 1,
                        name: "Кам'яний меч (stone_sword)",
                        ingredients: "cobblestone, cobblestone, stick",
                        role: "Weapon",
                        badgeClass: "bg-danger"
                    },
                    {
                        id: 2,
                        name: "Кам'яна кирка (stone_pickaxe)",
                        ingredients: "cobblestone, cobblestone, cobblestone, stick, stick",
                        role: "Tool",
                        badgeClass: "bg-success"
                    }
                ]
            };
        }
    }).mount("#app");
</script>
</body>
</html>
