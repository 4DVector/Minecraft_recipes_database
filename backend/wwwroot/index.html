<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP Рецепти</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div id="app">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="#">MVP Рецепти</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Головна</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row g-4">

            <div class="col-12 col-md-5">

                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white text-primary fw-bold py-3">Вхід до системи</div>
                    <div class="card-body p-4">
                        <form @submit.prevent="login">
                            <div class="mb-3">
                                <label class="form-label text-secondary fw-semibold">Електронна пошта</label>
                                <input type="email" v-model="loginForm.email" class="form-control" placeholder="@gmail.com" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-secondary fw-semibold">Пароль</label>
                                <input type="password" v-model="loginForm.password" class="form-control" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Увійти</button>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white text-success fw-bold py-3">Додати новий рецепт</div>
                    <div class="card-body p-4">
                        <form @submit.prevent="addItem">
                            <div class="mb-2">
                                <label class="form-label small fw-semibold">Системна назва</label>
                                <input type="text" v-model="newRecipe.name" class="form-control form-control-sm" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-semibold">Результат крафту</label>
                                <input type="text" v-model="newRecipe.itemResult" class="form-control form-control-sm" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-semibold">Кількість</label>
                                <input type="number" v-model.number="newRecipe.count" class="form-control form-control-sm" min="1" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Інгредієнти</label>
                                <input type="text" v-model="ingredientsInput" class="form-control form-control-sm" placeholder="cobblestone, stick ... (через кому)" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 btn-sm py-2">Зберегти рецепт</button>
                        </form>
                    </div>
                </div>

            </div> <div class="col-12 col-md-7">
            <div class="card shadow-sm">
                <div class="card-header fw-bold d-flex justify-content-between align-items-center bg-white py-3">
                    <span>Дані з API</span>
                    <span class="badge bg-secondary rounded-pill">{{ items.length }}</span>
                </div>

                <div v-if="loading" class="text-center my-4 text-muted">
                    <div class="spinner-border spinner-border-sm text-primary" role="status"></div> Завантаження...
                </div>

                <ul v-else class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between align-items-center py-3" v-for="recipe in items" :key="recipe.id">
                        <div class="w-70">
                            <div class="mb-1">
                                <input type="text" v-model="recipe.name" class="form-control form-control-sm fw-bold border-0 p-0 bg-transparent text-dark" @change="updateItem(recipe)">
                            </div>
                            <div class="text-muted small">Результат: <strong>{{ recipe.itemResult }}</strong> (x{{ recipe.count }})</div>
                            <div class="text-secondary small">Склад: {{ JSON.stringify(recipe.ingredients) }}</div>
                        </div>
                        <button class="btn btn-sm btn-outline-danger border-0" @click="deleteItem(recipe.id)">Видалити</button>
                    </li>
                </ul>
            </div>
        </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="app.js"></script>
</body>
</html>
